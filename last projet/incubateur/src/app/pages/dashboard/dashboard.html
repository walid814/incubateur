<div class="dashboard-adecco-layout page-content-dashboard">
  <app-dashboard-sidebar
    [isAdmin]="isAdmin()"
    [isUser]="isUser()"
    (logoutRequested)="logout()">
  </app-dashboard-sidebar>

  <main class="dashboard-main">
    <app-dashboard-header
      [currentUser]="currentUser"
      [isAdmin]="isAdmin()"
      [isUser]="isUser()"
      [progressPercentage]="getProgressPercentage()"
      [welcomeMessage]="getWelcomeMessage()"
      [initials]="getInitials()"
      (logoutRequested)="logout()">
    </app-dashboard-header>

    <div class="dashboard-main-grid">
      <app-dashboard-stats-overview
        [isAdmin]="isAdmin()"
        [isUser]="isUser()"
        [adminStats]="getAdminStats()"
        [projectStats]="projectStats">
      </app-dashboard-stats-overview>

      @if (isAdmin()) {
        <app-dashboard-admin-sections
          [candidatureStats]="candidatureStats"
          [userStats]="userStats"
          (exportRequested)="exportUserData()">
        </app-dashboard-admin-sections>
      }

      @if (isUser()) {
        <app-dashboard-user-projects
          [activeProjects]="activeProjects"
          [projectFinancing]="projectFinancing"
          (navigateToProjectRequested)="navigateToProject($event)"
          (navigateToFinancingRequested)="navigateToFinancing()">
        </app-dashboard-user-projects>
      }

      <!-- Bloc mes anciens projets (pour référence) -->
      <section class="dashboard-candidatures">
        <mat-card>
          <mat-card-title>Mes projets (ancien affichage)</mat-card-title>
          <mat-card-content>
            <div class="candidature-empty">
              <mat-icon class="candidature-icon" color="primary" style="font-size: 64px;">flight_takeoff</mat-icon>
              <p>Vous n'avez pas encore créé de projet.<br>Soumettez votre idée et bénéficiez de notre accompagnement pour la développer !</p>
              <a class="candidature-link" routerLink="/candidature">Créer mon premier projet</a>
            </div>
          </mat-card-content>
        </mat-card>
      </section>

      <app-dashboard-activity-tasks
        [activities]="getRecentActivities()"
        [tasks]="getPendingTasks()">
      </app-dashboard-activity-tasks>
    </div>
  </main>
</div>
